services:
  postgres:
    image: postgres:17
    container_name: aje_postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-someuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-somepassword}
      POSTGRES_DB: ${POSTGRES_DB:-retoDB}
    ports:
      - "5432:5432"
    expose:
      - "5432"

  adminer:
    image: adminer
    container_name: aje_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  backend:
    build: ./backend
    container_name: aje_backend
    environment:
      NODE_ENV: dev
      PORT: 3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-someuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-somepassword}
      POSTGRES_DB: ${POSTGRES_DB:-retoDB}
      RETOOL_API_URL: "https://retoolapi.dev/9q8zWh"
    ports:
      - "3000:3000"
    depends_on:
      - postgres
  
  frontend:
    build: ./frontend
    container_name: aje_frontend
    environment:
      VITE_API_URL: "http://localhost:3000/api"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
